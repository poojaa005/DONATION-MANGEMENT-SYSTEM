# ==============================
# DATABASE CONFIGURATION
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ngo_donation_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA CONFIGURATION
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ==============================
# JWT CONFIGURATION
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ==============================
# SERVER CONFIGURATION
# ==============================
server.port=${SERVER_PORT:8080}

# ==============================
# EMAIL CONFIGURATION (GMAIL SMTP SSL)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME}}
app.mail.from-name=${APP_MAIL_FROM_NAME:NGO Donation System}

# ==============================
# TWILIO SMS CONFIGURATION
# ==============================
# ==============================
# GOOGLE MAPS CONFIGURATION
# ==============================
google.maps.api-key=${GOOGLE_MAPS_API_KEY}

# ==============================
# CORS CONFIGURATION
# ==============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
